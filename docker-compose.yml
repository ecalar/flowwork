version: '3.8'
services:
  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"   # Puerto de conexión AMQP
      - "15672:15672" # Interfaz gráfica de gestión

  postgres-tasks:
    image: postgres:16
    environment:
      POSTGRES_DB: flowwork_tasks
      POSTGRES_USER: flowwork
      POSTGRES_PASSWORD: flowwork
    ports:
      - "5432:5432"

  postgres-chat:
    image: postgres:16
    environment:
      POSTGRES_DB: flowwork_chat
      POSTGRES_USER: flowwork
      POSTGRES_PASSWORD: flowwork
    ports:
      - "5433:5432"

  postgres-time:
    image: postgres:16
    environment:
      POSTGRES_DB: flowwork_time
      POSTGRES_USER: flowwork
      POSTGRES_PASSWORD: flowwork
    ports:
      - "5434:5432"