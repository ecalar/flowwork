server:
  port: 8083

spring:
  application:
    name: time-service
  datasource:
    url: jdbc:postgresql://localhost:5434/flowwork_time
    username: flowwork
    password: flowwork
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  rabbitmq:
    host: localhost
    port: 5672

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true