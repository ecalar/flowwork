server:
  port: 8083

spring:
  application:
    name: time-service
  datasource:
    # Por simplicidad en desarrollo, usamos la misma base de datos del task-service.
    # En producción (FCT), cada servicio tendría su propia URL.
    url: jdbc:postgresql://localhost:5432/flowwork_tasks
    username: flowwork
    password: flowwork
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  rabbitmq:
    host: localhost
    port: 5672

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true