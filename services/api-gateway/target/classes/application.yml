server:
  port: 8084

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "http://localhost:5173"
            allowedMethods: "GET,POST,PUT,DELETE,OPTIONS"
            allowedHeaders: "*"
            allowCredentials: true
            maxAge: 3600
      routes:
        - id: task-service
          uri: lb://TASK-SERVICE
          predicates:
            - Path=/api/tasks/**
          filters:
            - Authentication

        - id: task-service-projects
          uri: lb://task-service
          predicates:
            - Path=/api/projects/**
          filters:
            - Authentication

        - id: chat-service-api
          uri: lb://chat-service
          predicates:
            - Path=/api/chat/**
          filters:
            - Authentication

        - id: chat-websocket
          uri: lb://chat-service
          predicates:
            - Path=/ws-chat/**

        - id: time-service
          uri: lb://time-service
          predicates:
            - Path=/api/time/**
          filters:
            - Authentication

jwt:
  secret: Y3VzdG9taWZ5LXN1cGVyLXNlY3JldC1rZXktZm9yLWRldmVsb3BtZW50LXB1cnBvc2Vz
  expiration: 86400000

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true